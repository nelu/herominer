<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }
        textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            margin-top: 1rem;
        }
        #dialog {
            display: none;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>
    <h1>✏️ Edit Task: {{ task_id }}</h1>
    <textarea id="editor"></textarea><br>
    <button id="save">💾 Save</button>

    <div id="dialog" title="Status">
        <p>Saving task data...</p>
    </div>

    <script>
    const taskId = "{{ task_id }}";

    $.get(`/tasks/${taskId}`, function(data) {
        if (!data || data.error) {
            $("#editor").val("Task not found");
            return;
        }
        $("#editor").val(JSON.stringify(data, null, 2));
    });

    $("#save").click(function() {
        try {
            let taskData = JSON.parse($("#editor").val());
            $("#dialog").dialog({ modal: true });
            $.ajax({
                url: `/tasks/${taskId}`,
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify(taskData),
                success: () => {
                    $("#dialog").html("<p>Task saved successfully ✅</p>");
                },
                error: () => {
                    $("#dialog").html("<p>Failed to save task ❌</p>");
                }
            });
        } catch (e) {
            alert("Invalid JSON");
        }
    });
    </script>
</body>
</html>
